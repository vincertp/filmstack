name: Validate Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'docs/skills.md'
  pull_request:
    paths:
      - 'skills/**'
      - 'docs/skills.md'

jobs:
  validate:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SKILL.md files exist in each skill directory
        run: |
          echo "=== Checking skill directory structure ==="
          failed=0
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "FAIL: skills/$skill_name/ is missing SKILL.md"
              failed=1
            else
              echo "OK:   skills/$skill_name/SKILL.md exists"
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "ERROR: One or more skill directories are missing SKILL.md"
            exit 1
          fi

      - name: Validate SKILL.md frontmatter
        run: |
          echo "=== Validating SKILL.md frontmatter ==="
          failed=0

          for skill_file in skills/*/SKILL.md; do
            skill_name=$(basename $(dirname "$skill_file"))

            # Check file starts with ---
            first_line=$(head -1 "$skill_file")
            if [ "$first_line" != "---" ]; then
              echo "FAIL: $skill_file — missing YAML frontmatter (file must start with ---)"
              failed=1
              continue
            fi

            # Extract frontmatter block
            frontmatter=$(awk '/^---/{p++; if(p==2) exit} p==1{print}' "$skill_file")

            # Check required field: name
            if ! echo "$frontmatter" | grep -q "^name:"; then
              echo "FAIL: $skill_file — missing required field: name"
              failed=1
            fi

            # Check required field: description
            if ! echo "$frontmatter" | grep -q "^description:"; then
              echo "FAIL: $skill_file — missing required field: description"
              failed=1
            fi

            # Check description is not empty
            desc_value=$(echo "$frontmatter" | grep "^description:" | sed 's/^description:\s*//')
            if [ -z "$desc_value" ]; then
              echo "FAIL: $skill_file — description field is empty"
              failed=1
            fi

            # Check name matches directory name
            name_value=$(echo "$frontmatter" | grep "^name:" | sed 's/^name:\s*//')
            if [ "$name_value" != "$skill_name" ]; then
              echo "WARN: $skill_file — name field ('$name_value') does not match directory name ('$skill_name')"
              # Warning only, not failure
            fi

            if [ "$failed" -eq 0 ]; then
              echo "OK:   $skill_file"
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "ERROR: One or more SKILL.md files have frontmatter issues"
            echo "Required frontmatter format:"
            echo "---"
            echo "name: skill-name"
            echo "description: One-sentence description"
            echo "---"
            exit 1
          fi

      - name: Check docs/skills.md covers all skills
        run: |
          echo "=== Checking docs/skills.md coverage ==="
          missing=0

          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if ! grep -q "## /$skill_name" docs/skills.md; then
              echo "WARN: docs/skills.md is missing a section for /$skill_name"
              missing=1
            else
              echo "OK:   /$skill_name is documented in docs/skills.md"
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "WARNING: Some skills are missing documentation in docs/skills.md"
            echo "Add a '## /skill-name' section following the existing pattern."
            echo "(This is a warning, not a failure — PRs can proceed but documentation is expected.)"
            # Not failing CI on this — treat as advisory
          fi

      - name: Count skills and report
        run: |
          echo "=== filmstack skill count ==="
          skill_count=$(ls -d skills/*/ | wc -l | tr -d ' ')
          echo "Total skills: $skill_count"
          ls -d skills/*/ | sed 's|skills/||' | sed 's|/||' | sed 's/^/  - \//'
